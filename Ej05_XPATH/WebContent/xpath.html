<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>

<script>

//Guardamos el xml en esta variable global:
xml = null;

//Cargando un xml con una petición ajax
function obtenerFicheroXML(){
	var xhttp = new XMLHttpRequest();
	xhttp.onreadystatechange = function() {
		//console.log("readyState:"+this.readyState);
		if (this.readyState == 4 && this.status == 200) {
	    	procesarRespuesta(this.responseXML);
	    	xml = this.responseXML;
	    }
	};
	xhttp.open("GET", "fichero.xml", true);
	xhttp.send();
}

function ejecutarExpresion(xml, expresion, contextNode){

	if( contextNode == undefined ){
		contextNode = xml;
	} 
	
	var xPathResult = xml.evaluate(
			 expresion, 
			 contextNode, 
			 null, 
			 XPathResult.ANY_TYPE, 
			 null
			);	
	return xPathResult;
}


function procesarRespuesta(xml){

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/peliculas/pelicula/titulo");
	console.log(xPathResult);
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.childNodes[0].nodeValue);
	}
	
	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/peliculas/pelicula/titulo/text()");
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "//pelicula/titulo/text()");
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/peliculas//titulo/text()");
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/libros/libro/@id");
	var xPathResult = ejecutarExpresion(xml, "//libro/@id"); //idem
	console.log(xPathResult);
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/libros/libro[position()<3]/titulo/text()");
	console.log(xPathResult);
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "//pelicula[@id>=3]/titulo/text()");
	console.log(xPathResult);
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "//pelicula/titulo/text() | //libro/titulo/text()");
	console.log(xPathResult);
	while(nodo = xPathResult.iterateNext()){
		console.log(nodo.nodeType+"-"+nodo.nodeName+"-"+nodo.nodeValue);
	}	
	
}

function rellenarTabla(){

	console.log("---------------------------------------------");
	var xPathResult = ejecutarExpresion(xml, "/raiz/peliculas/pelicula");
	
	var tabla = document.getElementById("tablaPeliculas");
	tabla.innerHTML = "";
	
	while(nodoPelicula = xPathResult.iterateNext()){

		//Con js:
		var titulo = nodoPelicula.childNodes[1].childNodes[0].nodeValue;
		//console.log("TITULO 1:"+titulo);		
		
		var xPathResult2 = ejecutarExpresion(xml, "titulo/text()", nodoPelicula);
		var titulo = xPathResult2.iterateNext().nodeValue;
		
		xPathResult2 = ejecutarExpresion(xml, "director/text()", nodoPelicula);
		var director = xPathResult2.iterateNext().nodeValue;
		
		xPathResult2 = ejecutarExpresion(xml, "genero/text()", nodoPelicula);
		var genero = xPathResult2.iterateNext().nodeValue;
		
		xPathResult2 = ejecutarExpresion(xml, "year/text()", nodoPelicula);
		var year = xPathResult2.iterateNext().nodeValue;
	
		tr = document.createElement("tr");
		td1 = document.createElement("td");
		td2 = document.createElement("td");
		td3 = document.createElement("td");
		td4 = document.createElement("td");
		txt1 = document.createTextNode(titulo);
		txt2 = document.createTextNode(director);
		txt3 = document.createTextNode(genero);
		txt4 = document.createTextNode(year);
		td1.appendChild(txt1);
		td2.appendChild(txt2);
		td3.appendChild(txt3);
		td4.appendChild(txt4);
		tr.appendChild(td1);
		tr.appendChild(td2);
		tr.appendChild(td3);
		tr.appendChild(td4);
		
		tabla.appendChild(tr);		
		
	}
	
}


</script>

<body onload="obtenerFicheroXML()">

	<h2 align="center">
		Películas
	</h2>
	
	<p align="center">
		<input type="button" value="Listar" onclick="rellenarTabla()"/>
	</p>
	
	<table align="center" border="1">
		<tr>
			<th>Título</th>
			<th>Director</th>
			<th>Genero</th>
			<th>Año</th>
		</tr>
		<tbody id="tablaPeliculas"></tbody>
	</table>

</body>
</html>
