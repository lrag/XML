<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>

<script
  src="https://code.jquery.com/jquery-4.0.0.min.js"
  integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
  crossorigin="anonymous"></script>

<script type="text/javascript">

function getPeliculas(){
    fetch("http://localhost:8080/peliculas")
    .then(response => response.text()) //en vez de response.json()
    .then(xml => {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xml, "application/xml");
        
        const etiquetasPelicula = xmlDoc.getElementsByTagName("pelicula");
        const peliculas = [];

        for (let i = 0; i < etiquetasPelicula.length; i++) {
            const nodoPelicula = etiquetasPelicula[i];
            const pelicula = {
                id      : parseInt(nodoPelicula.getAttribute("id")), // Atributo
                titulo  : nodoPelicula.getElementsByTagName("titulo")[0].textContent, //Nodo de texto hijo de <titulo>
                director: nodoPelicula.getElementsByTagName("director")[0].textContent,
                genero  : nodoPelicula.getElementsByTagName("genero")[0].textContent,
                year    : parseInt(nodoPelicula.getElementsByTagName("year")[0].textContent)
            };
            peliculas.push(pelicula);
        }
        rellenarTabla(peliculas)
    })
    .catch(error => console.error(error)) 
}

function rellenarTabla(peliculas){
    $('#tablaPeliculas').html('')
    $.each(peliculas, (index, pelicula)=>{
        let html = `
            <tr>
                <td>${pelicula.titulo}</td>
                <td>${pelicula.director}</td>
                <td>${pelicula.genero}</td>
                <td>${pelicula.year}</td>
            </tr>`
        $(html).click( () => seleccionarProducto(pelicula.id)).appendTo("#tablaPeliculas")        
    })
}

function crearXML(){	
	//Creamos un documento XML vacío con el nodo raíz <pelicula>
	let xmlDoc = document.implementation.createDocument("", "pelicula", null);
	let raiz = xmlDoc.documentElement;

	let titulo = xmlDoc.createElement("titulo"); //Crear nodo
	titulo.textContent = $('#titulo').val();     //Le añadimos un nodo de texto
	raiz.appendChild(titulo);                    //Añadir al padre

	let director = xmlDoc.createElement("director"); 
	director.textContent = $('#director').val();     
	raiz.appendChild(director);                      

	let genero = xmlDoc.createElement("genero");     
	genero.textContent = $('#genero').val();         
	raiz.appendChild(genero);                        

	let year = xmlDoc.createElement("year");         
	year.textContent = $('#year').val();             
	raiz.appendChild(year);                          

	let serializer = new XMLSerializer();
	return serializer.serializeToString(xmlDoc);
}

function insertarPelicula(){
	
	/*
	let xml = `
        <pelicula>            
            <titulo>${$('#titulo').val()}</titulo>
            <director>${$('#director').val()}</director>
            <genero>${$('#genero').val()}</genero>
            <year>${$('#year').val()}</year>
        </pelicula>
    `
    */
    
    let xml = crearXML()

    fetch("http://localhost:8080/peliculas", {
        method: "POST",
        headers: {
            "Content-Type": "application/xml", 
            "Accept": "application/xml"        
        },
        body: xml 
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`Error al insertar: ${response.status}`);
        }
        return response.text(); 
    })
    .then(xmlRespuesta => {
        alert("¡Película insertada con éxito!")
        console.log("Respuesta:", xmlRespuesta)
        getPeliculas()
        vaciarFormulario()

    })
    .catch(error => {
        console.error("Hubo un problema con la petición:", error)
        alert("No se pudo insertar la película. Revisa los datos o el formato.")
    })
}

function vaciarFormulario(){
    $('#titulo').val('')
    $('#director').val('')
    $('#genero').val('')
    $('#year').val('')
}

window.onload = function(){
	$("#btnInsertar").click(insertarPelicula)
    getPeliculas()
}

</script>

<body>

	<h1 align="center">XML</h1>

	<div align="center">
        <button type="button" id="btnInsertar">Insertar</button>
        <button type="button">Modificar</button>
        <button type="button">Borrar</button>
        <button type="button">Vaciar</button>
    </div>

    <br><br>

    <div align="center">
		<table border="0" cellpadding="5">
			<tr>
			    <td>Título:</td>
			    <td><input type="text" id="titulo"></td>
			</tr>
			<tr>
			    <td>Director:</td>
			    <td><input type="text" id="director"></td>
			</tr>
			<tr>
			    <td>Género:</td>
			    <td><input type="text" id="genero"></td>
			</tr>
			<tr>
			    <td>Año (Year):</td>
			    <td><input type="text" id="year"></td>
			</tr>
		</table>
    </div>

    <br><br>

    <div align="center">
        <table border="1" cellpadding="8" cellspacing="0">
            <tr>
                <th>Título</th>
                <th>Director</th>
                <th>Género</th>
                <th>Año</th>
            </tr>
            <tbody id="tablaPeliculas"></tbody>
        </table>
    </div>

</body>
</html>
