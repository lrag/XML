function getListadoPeliculas(){
    fetch("http://localhost:8080/peliculas")
    .then( function(responseHead) {
        return responseHead.text() //en vez de response.json()
    }) 
    .then(function(xml) {

        //xmlDoc representa la raíz del árbol

                director: nodoPelicula.getElementsByTagName("director")[0].textContent,

    	const parser = new DOMParser();
    	const xmlDoc = parser.parseFromString(xml, "application/xml");

    	//Buscamos películas desde el raíz
    	const resultadoXPath = xmlDoc.evaluate("//pelicula", xmlDoc, null, XPathResult.ORDERED_NODE_ITERATOR_TYPE, null);

    	const peliculas = [];
    	let nodoPelicula = resultadoXPath.iterateNext();

    	while (nodoPelicula) {
    	    const pelicula = {
    	        id      : parseInt(nodoPelicula.getAttribute("id")), 
    	        //Estas búsquedas son a partir del nodo película
    	        titulo  : xmlDoc.evaluate("titulo", nodoPelicula, null, XPathResult.STRING_TYPE, null).stringValue,
    	        director: xmlDoc.evaluate("director", nodoPelicula, null, XPathResult.STRING_TYPE, null).stringValue,
    	        genero  : xmlDoc.evaluate("genero", nodoPelicula, null, XPathResult.STRING_TYPE, null).stringValue,
    	        year    : parseInt(xmlDoc.evaluate("year", nodoPelicula, null, XPathResult.STRING_TYPE, null).stringValue)
    	    };
    	    
    	    peliculas.push(pelicula);
    	    nodoPelicula = resultadoXPath.iterateNext(); 
    	}

    	rellenarTabla(peliculas);   
    })
    .catch(error => console.error(error));    
}

function rellenarTabla(peliculas){
    $('#tablaPeliculas').html('')
    $.each(peliculas, (index, pelicula)=>{
        let html = `
            <tr>
                <td>${pelicula.titulo}</td>
                <td>${pelicula.director}</td>
                <td>${pelicula.genero}</td>
                <td>${pelicula.year}</td>
            </tr>`
        $(html).click( () => seleccionarProducto(pelicula.id)).appendTo("#tablaPeliculas")        
    })
}

function insertarPelicula(){

	let xml = `
        <pelicula>
            <titulo>${$('#titulo').val()}</titulo>
            <director>${$('#director').val()}</director>
            <genero>${$('#genero').val()}</genero>
            <year>${$('#year').val()}</year>
        </pelicula>
    `

    fetch("http://localhost:8080/peliculas", {
        method: "POST",
        headers: {
            "Content-Type": "application/xml", 
            "Accept": "application/xml"        
        },
        body: xml 
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`Error al insertar: ${response.status}`);
        }
        return response.text(); 
    })
    .then(xmlRespuesta => {
        alert("¡Película insertada con éxito!")
        console.log("Respuesta:", xmlRespuesta)
        getListadoPeliculas()
        vaciarFormulario()
    })
    .catch(error => {
        console.error("Hubo un problema con la petición:", error)
        alert("No se pudo insertar la película. Revisa los datos o el formato.")
    })
}

function vaciarFormulario(){
    $('#titulo').val('')
    $('#director').val('')
    $('#genero').val('')
    $('#year').val('')
}

window.onload = function(){
    getListadoPeliculas()    
    document.getElementById("btnInsertar").onclick = insertarPelicula
}
